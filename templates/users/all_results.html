<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Interview Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #e0e7ff 0%, #dbeafe 100%);
            background-attachment: fixed;
        }
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        table {
            width: 80%;
            margin: 2rem auto;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        th, td {
            padding: 1rem;
            text-align: center;
            border: 2px solid #4F46E5; /* Indigo border for table cells */
        }
        th {
            background-color: #f8fafc;
            font-weight: 600;
            color: #1f2937;
        }
        td {
            background-color: #ffffff;
        }
        tr:hover td {
            background-color: #f1f5f9;
            transition: background-color 0.2s ease-in-out;
        }
        .status {
            font-weight: 500;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
            display: inline-block;
        }
        .status-passed {
            background-color: #d1fae5;
            color: #065f46;
        }
        .status-failed {
            background-color: #fee2e2;
            color: #991b1b;
        }
        .container-bg {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="container-bg rounded-2xl shadow-2xl p-8 max-w-4xl w-full fade-in">
        <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">All Interview Results</h2>
            <center><a href="{% url 'admin_home' %}" class="mt-6 inline-block bg-indigo-600 text-white px-6 py-3 rounded-lg back-button transition-all duration-300">
            Back to Home
        </a></center>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Job Role</th>
                    <th>Average Score</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                {% for result in results %}
                <tr>
                    <td>{{ result.candidate.name }}</td>
                    <td>{{ result.candidate.email }}</td>
                    <td>{{ result.candidate.job_description }}</td>
                    <td>{{ result.avg_score|floatformat:2 }}</td>
                    <td><strong class="status {% if result.status == 'Passed' %}status-passed{% else %}status-failed{% endif %}">{{ result.status }}</strong></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

</body>
</html>
